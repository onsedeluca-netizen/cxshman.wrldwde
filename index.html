<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CXSHMAN WORLDWIDE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=UnifrakturMaguntia&family=Rye&family=Pirata+One&family=Rubik+Glitch&family=Nosifer&display=swap" rel="stylesheet">
<!-- Font Awesome for Social Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --red: #c41e3a;
  --dark: #0a0a0a;
  --gray: #1a1a1a;
  --light: #e0e0e0;
  --white: #ffffff;
  --gold: #d4af37;
  --instagram: #E4405F;
  --tiktok: #000000;
  --discord: #5865F2;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--dark);
  color: var(--light);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ENTRANCE SCREEN */
.entrance {
  position: fixed;
  inset: 0;
  background: var(--dark);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  cursor: pointer;
  transition: opacity 0.8s ease, visibility 0.8s;
}

.entrance.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

/* Background image for entrance screen */
.entrance-bg {
  position: absolute;
  inset: 0;
  background-image: url('images/entrance-bg.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  opacity: 0.3;
  z-index: -1;
}

.entrance-logo {
  font-family: 'Pricedown';
  font-size: clamp(4rem, 15vw, 12rem);
  letter-spacing: 0.1em;
  color: rgb(rgb(253, 253, 253));
  text-shadow: 
    0 0 20px rgba(231, 193, 22, 0.877),
    0 0 40px rgba(196, 30, 58, 0.6),
    0 0 60px rgba(196, 30, 58, 0.4),
    4px 4px 0px rgba(0,0,0,0.8);
  animation: pulse 2s ease-in-out infinite;
  text-transform: uppercase;
  line-height: 1.1;
}

.entrance-sub {
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(1.5rem, 2vw, 1rem);
  letter-spacing: 1em;
  text-transform: uppercase;
  color: rgb(155, 71, 15);
  font-weight: 600;
  margin-top: 1rem;
  text-shadow: 0 0 10px rgba(196, 30, 58, 0.5);
}

.entrance-hint {
  position: absolute;
  bottom: 15%;
  font-size: 0.75rem;
  letter-spacing: 0.5em;
  text-transform: uppercase;
  opacity: 0.4;
  animation: blink 2s infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); filter: brightness(1); }
  50% { transform: scale(1.02); filter: brightness(1.2); }
}

@keyframes blink {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.8; }
}

/* BACKGROUND */
.bg {
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse at 20% 20%, rgba(196, 30, 58, 0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(196, 30, 58, 0.1) 0%, transparent 50%),
    var(--dark);
  z-index: -2;
}

/* Background image for main page */
.bg-image {
  position: fixed;
  inset: 0;
  background-image: url('images/backgroundmain.gif');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  opacity: 0.15;
  z-index: -0.5;
}

.vignette {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.4) 100%);
  z-index: -1;
  pointer-events: none;
}

/* MAIN CONTENT */
.main-content {
  opacity: 0;
  transform: translateY(30px);
  pointer-events: none;
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.main-content.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.container {
  max-width: 1800px;
  margin: 0 auto;
  padding: 4rem 2rem;
}

/* HEADER */
header {
  text-align: center;
  margin-bottom: 5rem;
  position: relative;
}

.logo-main {
  font-family: 'Pirata One', cursive;
  font-size: clamp(3rem, 12vw, 8rem);
  letter-spacing: 0.15em;
  color: #f6fdb4;
  line-height: 1.1;
  text-shadow: 
    0 0 30px rgba(235, 3, 3, 0.836),
    0 0 30px rgba(235, 3, 3, 0.836),
    3px 3px 0px rgba(0,0,0,0.8);
  text-transform: uppercase;
}

.logo-sub {
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(0.9rem, 2vw, 1.2rem);
  letter-spacing: 0.8em;
  text-transform: uppercase;
  color: var(--red);
  font-weight: 600;
  margin-top: 0.5rem;
  text-shadow: 0 0 10px rgba(196, 30, 58, 0.5);
}

.tagline {
  margin-top: 1.5rem;
  font-size: 1rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  opacity: 0.6;
}

.divider {
  width: 60px;
  height: 2px;
  background: var(--red);
  margin: 2rem auto;
  box-shadow: 0 0 10px var(--red);
}

/* SECTIONS */
.section {
  margin-bottom: 5rem;
}

/* SECTION TITLES - Same style as CXSHMAN logo (Nosifer font) */
.section-title-HEADS,
.section-title-cxshman {
  font-family: 'Rye', cursive;
  font-size: clamp(2rem, 6vw, 4rem);
  letter-spacing: 0.15em;
  color: #4f6bb8ef;
  margin-bottom: 2.5rem;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  text-transform: uppercase;
  line-height: 1.2;
  text-shadow: 
    0 0 20px rgba(196, 30, 58, 0.6),
    0 0 40px rgba(196, 30, 58, 0.4),
    2px 2px 0px rgba(0,0,0,0.8);
}

  .section-title-founders::before,
  .section-title-founders::after,
  .section-title-cxshman::before,
  .section-title-cxshman::after {
  content: '';
  width: 60px;
  height: 3px;
  background: var(--red);
  opacity: 0.6;
  box-shadow: 0 0 10px var(--red);
}

/* GRID - CENTERED */
.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 1.5rem;
}

/* CARDS - ENHANCED BORDER EFFECTS */
.card {
  background: var(--gray);
  border: 3px solid transparent;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  position: relative;
  width: 220px;
  flex-shrink: 0;
  
  background-image: 
    linear-gradient(var(--gray), var(--gray)),
    linear-gradient(135deg, oklab(77.327% 0.10632 -0.10691 / 0.8) 0%, transparent 50%, rgba(196, 30, 58, 0.8) 100%);
  background-origin: border-box;
  background-clip: padding-box, border-box;
}

.card::before {
  content: '';
  position: absolute;
  inset: -3px;
  background: linear-gradient(45deg, var(--red), var(--gold), var(--red), var(--gold));
  background-size: 400% 400%;
  border-radius: 14px;
  z-index: -1;
  opacity: 0;
  transition: opacity 0.4s ease;
  animation: borderGlow 3s ease infinite;
}

@keyframes borderGlow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.card:hover::before {
  opacity: 1;
}

.card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(196, 30, 58, 0.1) 0%, transparent 50%, rgba(196, 30, 58, 0.1) 100%);
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 1;
  pointer-events: none;
}

.card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: 
    0 20px 40px rgba(196, 30, 58, 0.4),
    0 0 30px rgba(196, 30, 58, 0.2),
    inset 0 0 20px rgba(196, 30, 58, 0.1);
  border-color: transparent;
}

.card:hover::after {
  opacity: 1;
}

.card:active {
  transform: translateY(-4px) scale(0.98);
  box-shadow: 
    0 10px 20px rgba(196, 30, 58, 0.3),
    inset 0 0 30px rgba(196, 30, 58, 0.2);
}

.card-image-wrap {
  position: relative;
  width: 100%;
  height: 280px;
  overflow: hidden;
}

.card-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
}

.card:hover .card-image {
  transform: scale(1.1);
}

.card-image-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(10,10,10,0.9) 0%, transparent 60%);
  z-index: 2;
  pointer-events: none;
}

/* VINYL DISC */
.card-vinyl {
  position: absolute;
  bottom: 60px;
  right: 15px;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: 3px solid var(--red);
  overflow: hidden;
  box-shadow: 
    0 5px 20px rgba(0,0,0,0.6),
    0 0 15px rgba(196, 30, 58, 0.5);
  z-index: 4;
  transition: all 0.3s ease;
  background: var(--dark);
}

.card-vinyl::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 20px;
  height: 20px;
  background: var(--dark);
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  z-index: 2;
}

.card-vinyl img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  animation: spin 8s linear infinite;
  animation-play-state: paused;
}

.card:hover .card-vinyl {
  transform: scale(1.1);
  border-color: var(--gold);
  box-shadow: 
    0 8px 30px rgba(196, 30, 58, 0.5),
    0 0 20px rgba(212, 175, 55, 0.3);
}

.card:hover .card-vinyl img {
  animation-play-state: running;
}

.card-ripple {
  position: absolute;
  inset: 0;
  border-radius: 12px;
  border: 2px solid transparent;
  transition: all 0.3s ease;
  pointer-events: none;
  z-index: 5;
}

.card:active .card-ripple {
  border-color: var(--gold);
  box-shadow: 
    inset 0 0 30px rgba(196, 30, 58, 0.4),
    inset 0 0 60px rgba(212, 175, 55, 0.2);
}

.card-click-indicator {
  position: absolute;
  top: 15px;
  left: 15px;
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--red) 0%, #8b0000 100%);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 1rem;
  z-index: 4;
  opacity: 0;
  transform: scale(0.8) rotate(-10deg);
  transition: all 0.3s ease;
  box-shadow: 
    0 4px 15px rgba(196, 30, 58, 0.5),
    0 0 10px rgba(196, 30, 58, 0.3);
  border: 2px solid rgba(255,255,255,0.2);
}

.card:hover .card-click-indicator {
  opacity: 1;
  transform: scale(1) rotate(0deg);
}

.card-click-indicator::before {
  content: '▶';
  margin-left: 3px;
  filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
}

.card-play-overlay {
  position: absolute;
  inset: 0;
  background: rgba(196, 30, 58, 0);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 3;
  transition: all 0.3s ease;
  opacity: 0;
}

.card:hover .card-play-overlay {
  background: rgba(196, 30, 58, 0.25);
  opacity: 1;
}

.card-play-icon {
  width: 65px;
  height: 65px;
  background: linear-gradient(135deg, var(--red) 0%, #8b0000 100%);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 1.6rem;
  transform: scale(0);
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow: 
    0 10px 30px rgba(0,0,0,0.5),
    0 0 20px rgba(196, 30, 58, 0.5);
  border: 3px solid rgba(255,255,255,0.2);
}

.card:hover .card-play-icon {
  transform: scale(1);
}

.card-info {
  padding: 1.3rem;
  text-align: center;
  position: relative;
  z-index: 3;
  margin-top: -40px;
}

.card-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: 0.05em;
  color: rgb(252, 252, 252);
  margin-bottom: 0.3rem;
  text-shadow: 0 2px 4px rgba(238, 235, 60, 0.904);
}

.card-role {
  font-size: 1.5rem;
  color: rgb(22, 133, 236);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-weight: 800;
  text-shadow: 0 0 10px rgba(198, 206, 200, 0.918);
}

/* INSTAGRAM STYLE MUSIC PLAYER - VISIBLE ON ENTRANCE */
.ig-music-player {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: none;
  align-items: center;
  gap: 16px;
  z-index: 10000;

  width: 680px;
  max-width: calc(100vw - 40px);
  height: 68px;

  background: rgba(28,28,30,.96);
  backdrop-filter: blur(20px);

  border: 1px solid rgba(255,255,255,.08);
  border-radius: 10px;

  padding: 10px 14px;

  box-shadow:
    0 10px 35px rgba(0,0,0,.45);
}

.ig-music-player.visible {
  display: flex;
}

.ig-music-player:hover {
  transform: translateX(-50%) scale(1.05);
  box-shadow: 0 15px 40px rgba(196, 30, 58, 0.3);
}

.ig-disc{
    width:48px;
    height:48px;
    border-radius:6px;
    overflow:hidden;
    border:none;
    box-shadow:none;
    flex-shrink:0;
}

.ig-disc img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.ig-disc::after{
    display:none;
}

.ig-waves{
    margin-left:6px;
    display:flex;
    align-items:center;
    gap:2px;
}

.ig-wave {
  width: 3px;
  background: linear-gradient(to top, var(--red), var(--gold));
  border-radius: 2px;
  animation: wave 0.8s ease-in-out infinite;
}

.ig-wave:nth-child(1) { height: 8px; animation-delay: 0s; }
.ig-wave:nth-child(2) { height: 15px; animation-delay: 0.1s; }
.ig-wave:nth-child(3) { height: 10px; animation-delay: 0.2s; }
.ig-wave:nth-child(4) { height: 18px; animation-delay: 0.3s; }
.ig-wave:nth-child(5) { height: 12px; animation-delay: 0.4s; }

.ig-disc.paused ~ .ig-waves .ig-wave {
  animation: none;
  height: 4px;
}

@keyframes wave {
  0%, 100% { transform: scaleY(0.5); }
  50% { transform: scaleY(1); }
}

.ig-info{
    display:flex;
    flex-direction:column;
    justify-content:center;
    min-width:180px;
}

.ig-track{
    color:#fff;
    font-size:18px;
    font-weight:700;
    line-height:1;
}

.ig-artist{
    margin-top:4px;
    color:#9d9d9d;
    font-size:13px;
    font-weight:500;
}

.ig-controls{
    margin-left:auto;
    display:flex;
    align-items:center;
    gap:16px;
}

.ig-btn{
    width:34px;
    height:34px;
    border:none;
    background:transparent;
    color:#fff;
    font-size:16px;
    cursor:pointer;
    transition:.2s;
}

.ig-btn:hover{
    color:#fff;
    transform:scale(1.12);
    filter:none;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10, 10, 10, 0.95);
  backdrop-filter: blur(20px);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  opacity: 0;
  transition: opacity 0.3s;
}

.modal.active {
  display: flex;
  opacity: 1;
}

.modal-box {
  background: linear-gradient(145deg, var(--gray) 0%, var(--dark) 100%);
  border: 2px solid transparent;
  border-radius: 20px;
  width: 650px;
  height: 900px;
  max-width: calc(100vw - 2rem);
  max-height: calc(100vh - 2rem);
  position: relative;
  overflow: hidden;
  box-shadow:
    0 25px 50px rgba(0,0,0,0.5),
    0 0 30px rgba(196, 30, 58, 0.2);
  background-image:
    linear-gradient(var(--gray), var(--dark)),
    linear-gradient(135deg, var(--red), var(--gold), var(--red));
  background-origin: border-box;
  background-clip: padding-box, border-box;
}

.modal-close {
  position: absolute;
  top: 1rem;
  right: 1rem;
  width: 40px;
  height: 40px;
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
  color: var(--light);
  font-size: 1.5rem;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

.modal-close:hover {
  border-color: var(--red);
  color: var(--red);
  transform: rotate(90deg) scale(1.1);
  box-shadow: 0 0 20px rgba(196, 30, 58, 0.5);
}

.modal-visual {
  position: relative;
  height: 250px;
  overflow: hidden;
}

.modal-visual img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.modal-visual::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 0%, var(--gray) 100%);
}

.modal-visual-disc {
  position: absolute;
  bottom: -60px;
  right: 30px;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 3px solid var(--red);
  overflow: hidden;
  box-shadow: 
    0 10px 30px rgba(0,0,0,0.5),
    0 0 20px rgba(196, 30, 58, 0.3);
  z-index: 5;
}

.modal-visual-disc img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.modal-content {
  padding: 2rem;
  text-align: center;
}

.modal-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.5rem;
  color: var(--white);
  letter-spacing: 0.05em;
  margin-bottom: 0.3rem;
  text-shadow: 0 0 20px rgba(196, 30, 58, 0.3);
}

.modal-role {
  color: var(--red);
  font-size: 1rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 1.5rem;
  text-shadow: 0 0 10px rgb(255, 8, 0);
}

/* SOCIAL LINKS STYLES */
.modal-socials {
  display: flex;
  justify-content: center;
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.social-link {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  color: var(--white);
  text-decoration: none;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  position: relative;
  overflow: hidden;
  border: 2px solid transparent;
}

.social-link::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--red), var(--gold));
  opacity: 0;
  transition: opacity 0.3s;
  z-index: -1;
}

.social-link.instagram {
  background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
  box-shadow: 0 5px 15px rgba(225, 48, 108, 0.4);
}

.social-link.tiktok {
  background: #000;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
  border: 2px solid #fff;
}

.social-link.discord {
  background: #5865F2;
  box-shadow: 0 5px 15px rgba(88, 101, 242, 0.4);
}

.social-link:hover {
  transform: translateY(-5px) scale(1.1);
  box-shadow: 0 10px 25px rgba(196, 30, 58, 0.5);
}

.social-link:hover::before {
  opacity: 1;
}

.social-link:active {
  transform: translateY(-2px) scale(0.95);
}

.social-link i {
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
  z-index: 1;
}

.modal-player {
  background: rgba(0,0,0,0.3);
  border-radius: 15px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  border: 1px solid rgba(196, 30, 58, 0.2);
}

.modal-track-info {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 1rem;
  text-align: left;
}

.modal-track-img {
  width: 50px;
  height: 50px;
  border-radius: 8px;
  object-fit: cover;
  border: 2px solid var(--red);
  box-shadow: 0 0 10px rgba(196, 30, 58, 0.3);
}

.modal-track-details h4 {
  font-size: 0.9rem;
  color: var(--white);
  margin-bottom: 0.2rem;
}

.modal-track-details p {
  font-size: 0.75rem;
  color: rgba(255,255,255,0.6);
}

.modal-progress {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  margin-bottom: 1rem;
  overflow: hidden;
}

.modal-progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--red), var(--gold));
  border-radius: 2px;
  transition: width 0.1s linear;

    </div>
    <div class="card-info">
      <div class="card-name">${member.name}</div>
      <div class="card-role">${member.role}</div>
    </div>
  `;
  
  container.appendChild(card);
}

function renderAll() {
  founders.forEach(f => renderMember(f, 'foundersGrid'));
  cxshman.forEach(c => renderMember(c, 'cxshmanGrid'));
  members.forEach(m => renderMember(m, 'membersGrid'));
}

// MODAL FUNCTIONS
function openModal(member) {
  currentMember = member;
  
  bgWasPlayingBeforeModal = isBgPlaying;
  
  pauseBgMusic();
  
  memberMusic.src = member.music;
  memberMusic.loop = true;
  
  const imgSrc = member.image || `https://via.placeholder.com/450x250/1a1a1a/c41e3a?text=${encodeURIComponent(member.name)}`;
  document.getElementById('modalCoverImg').src = imgSrc;
  document.getElementById('modalDiscImg').src = imgSrc;
  document.getElementById('modalTrackImg').src = imgSrc;
  
  document.getElementById('modalName').textContent = member.name;
  document.getElementById('modalRole').textContent = member.position;
  document.getElementById('modalTrackName').textContent = member.track;
  document.getElementById('modalTrackArtist').textContent = member.artist;
  document.getElementById('modalJoined').textContent = member.joined;
  document.getElementById('modalRoleStat').textContent = member.role;
  document.getElementById('modalDiscord').textContent = '@' + member.discord;
  
  // UPDATE SOCIAL LINKS
  const instaLink = document.getElementById('socialInstagram');
  const tiktokLink = document.getElementById('socialTiktok');
  const discordLink = document.getElementById('socialDiscord');
  
  if (member.socials) {
    if (member.socials.instagram) {
      instaLink.href = member.socials.instagram;
      instaLink.style.display = 'flex';
    } else {
      instaLink.style.display = 'none';
    }
    
    if (member.socials.tiktok) {
      tiktokLink.href = member.socials.tiktok;
      tiktokLink.style.display = 'flex';
    } else {
      tiktokLink.style.display = 'none';
    }
    
    if (member.socials.discord) {
      discordLink.href = member.socials.discord;
      discordLink.style.display = 'flex';
    } else {
      discordLink.style.display = 'none';
    }
  }
  
  document.getElementById('profileModal').classList.add('active');
  document.body.style.overflow = 'hidden';
  
  playMemberMusic();
}

function playMemberMusic() {
  memberMusic.volume = 0.5;
  memberMusic.play().then(() => {
    isPlaying = true;
    document.getElementById('modalPlayBtn').textContent = '⏸';
    
    updateIgPlayer(currentMember.track, currentMember.artist, currentMember.image);
    document.getElementById('igPlayBtn').textContent = '⏸';
    document.getElementById('igDisc').classList.remove('paused');
    
    startProgress();
  }).catch(err => {
    console.log('Member music blocked:', err);
    isPlaying = false;
    document.getElementById('modalPlayBtn').textContent = '▶';
  });
}

function toggleModalPlay() {
  if (!currentMember) return;
  
  if (isPlaying) {
    memberMusic.pause();
    isPlaying = false;
    document.getElementById('modalPlayBtn').textContent = '▶';
    document.getElementById('igDisc').classList.add('paused');
    document.getElementById('igPlayBtn').textContent = '▶';
    stopProgress();
  } else {
    memberMusic.play();
    isPlaying = true;
    document.getElementById('modalPlayBtn').textContent = '⏸';
    document.getElementById('igDisc').classList.remove('paused');
    document.getElementById('igPlayBtn').textContent = '⏸';
    startProgress();
  }
}

function startProgress() {
  stopProgress();
  progressInterval = setInterval(() => {
    if (!memberMusic.duration) return;
    const progress = (memberMusic.currentTime / memberMusic.duration) * 100;
    document.getElementById('modalProgressBar').style.width = progress + '%';
  }, 100);
}

function stopProgress() {
  if (progressInterval) {
    clearInterval(progressInterval);
    progressInterval = null;
  }
}

function seekForward() {
  if (memberMusic) memberMusic.currentTime += 10;
}

function seekBackward() {
  if (memberMusic) memberMusic.currentTime -= 10;
}

function closeModal() {
  memberMusic.pause();
  memberMusic.currentTime = 0;
  isPlaying = false;
  stopProgress();
  
  currentMember = null;
  
  document.getElementById('profileModal').classList.remove('active');
  document.body.style.overflow = 'auto';
  
  if (bgWasPlayingBeforeModal) {
    playBgMusic();
  } else {
    document.getElementById('igDisc').classList.add('paused');
    document.getElementById('igPlayBtn').textContent = '▶';
    updateIgPlayer('Cxshman', 'BAYAG NI ONSE', 'music/cmanbgb.jpg');
  }
}

function closeModalOnBackdrop(e) {
  if (e.target === e.currentTarget) closeModal();
}

// KEYBOARD CONTROLS
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
  if (e.key === ' ' && document.getElementById('profileModal').classList.contains('active')) {
    e.preventDefault();
    toggleModalPlay();
  }
});

// PREVENT SCROLL BEFORE ENTER
document.body.style.overflow = 'hidden';

// INIT
renderAll();

// Profile Views Counter
const VIEWS_API_URL = '/.netlify/functions/views';

async function initProfileViews() {
  try {
    // Get current count
    const getResponse = await fetch(VIEWS_API_URL);
    const getData = await getResponse.json();
    
    if (getData.success) {
      updateViewDisplay(getData.count);
    }
    
    // Increment count (only once per session)
    if (!sessionStorage.getItem('viewCounted')) {
      const postResponse = await fetch(VIEWS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
      });
      
      const postData = await postResponse.json();
      
      if (postData.success) {
        updateViewDisplay(postData.count);
        sessionStorage.setItem('viewCounted', 'true');
        
        const countElement = document.getElementById('profileViewCount');
        countElement.classList.add('updated');
        setTimeout(() => countElement.classList.remove('updated'), 300);
      }
    }
  } catch (error) {
    console.error('Profile views error:', error);
    document.getElementById('profileViewCount').textContent = '--';
  }
}

function updateViewDisplay(count) {
  const countElement = document.getElementById('profileViewCount');
  const current = parseInt(countElement.textContent) || 0;
  const target = count;
  const duration = 1000;
  const startTime = performance.now();

  function animate(currentTime) {
    const elapsed = currentTime - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const easeOutQuart = 1 - Math.pow(1 - progress, 4);
    const currentCount = Math.floor(current + (target - current) * easeOutQuart);
    
    countElement.textContent = currentCount.toLocaleString();
    
    if (progress < 1) requestAnimationFrame(animate);
  }
  
  requestAnimationFrame(animate);
}

// Initialize when page loads
document.addEventListener('DOMContentLoaded', initProfileViews);
</script>
